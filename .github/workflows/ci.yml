name: OrzAudioCore

on: [push, pull_request]

jobs:
  abi-lite:
    strategy:
      matrix: {os: [macos-15, ubuntu-24.04]}
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: {node-version: 22}
      - run: node script/check-release-readiness.mjs
      - run: node script/generate-decoder-manifest.mjs --check
      - run: cmake --preset builtin-lite
      - run: cmake --build --preset builtin-lite
      - run: ctest --test-dir .cmake-build/builtin-lite --output-on-failure
      - run: swift test
      - run: cmake --install .cmake-build/builtin-lite --prefix "$RUNNER_TEMP/orzcore"
      - run: cmake -S Tests/SDK/consumer -B "$RUNNER_TEMP/consumer" -DCMAKE_PREFIX_PATH="$RUNNER_TEMP/orzcore"
      - run: cmake --build "$RUNNER_TEMP/consumer"
      - run: "$RUNNER_TEMP/consumer/consumer"

  sanitizer-lite:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - run: >-
          cmake -S . -B .cmake-build/sanitizer-lite
          -DORZ_PROFILE=builtin-lite -DORZ_BUILD_TESTS=ON
          -DCMAKE_BUILD_TYPE=Debug
          -DCMAKE_C_FLAGS="-fsanitize=address,undefined -fno-omit-frame-pointer"
          -DCMAKE_CXX_FLAGS="-fsanitize=address,undefined -fno-omit-frame-pointer"
          -DCMAKE_EXE_LINKER_FLAGS="-fsanitize=address,undefined"
      - run: cmake --build .cmake-build/sanitizer-lite
      - run: ctest --test-dir .cmake-build/sanitizer-lite --output-on-failure

  full-macos:
    runs-on: macos-15
    timeout-minutes: 90
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: {node-version: 22}
      - uses: actions/cache@v4
        with:
          path: .wasm-build/cache
          key: orz-decoder-sources-${{ runner.os }}-${{ runner.arch }}-${{ hashFiles('script/fetch-decoder-sources.sh') }}
      - run: ./script/fetch-decoder-sources.sh
      - run: ./script/build-native-libs.sh --strict
      - id: host
        run: echo "preset=macos-$(uname -m)" >> "$GITHUB_OUTPUT"
      - run: ./script/build-sdk.sh "${{ steps.host.outputs.preset }}"
      - run: cmake --install ".cmake-build/${{ steps.host.outputs.preset }}" --prefix "$RUNNER_TEMP/orzcore"
      - run: cmake -S Tests/SDK/consumer -B "$RUNNER_TEMP/consumer" -DCMAKE_PREFIX_PATH="$RUNNER_TEMP/orzcore"
      - run: cmake --build "$RUNNER_TEMP/consumer"
      - run: DYLD_LIBRARY_PATH="$RUNNER_TEMP/orzcore/lib" "$RUNNER_TEMP/consumer/consumer"

  web-binding:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: {node-version: 22}
      - run: node script/check-release-readiness.mjs
      - working-directory: SDK/Web
        run: npm ci
      - working-directory: SDK/Web
        run: npm run build
      - working-directory: SDK/Web
        run: npm test
