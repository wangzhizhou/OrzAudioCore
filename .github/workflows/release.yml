name: Release OrzAudioCore

on:
  push:
    tags: ["v*"]

permissions:
  contents: write

jobs:
  native:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: {node-version: 22}
      - name: Verify tag and manifest version
        run: node script/check-release-readiness.mjs "${GITHUB_REF_NAME#v}"
      - run: SOURCE_DATE_EPOCH="$(git log -1 --format=%ct)" ./script/package-sdk.sh builtin-lite "$RUNNER_TEMP/release"
      - uses: actions/upload-artifact@v4
        with:
          name: native
          path: |
            ${{ runner.temp }}/release/*.tar.gz
            ${{ runner.temp }}/release/*.sha256

  server:
    strategy:
      matrix:
        include:
          - {runner: ubuntu-24.04, preset: linux-x86_64, arch: x86_64}
          - {runner: ubuntu-24.04-arm, preset: linux-arm64, arch: arm64}
    runs-on: ${{ matrix.runner }}
    timeout-minutes: 90
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: {node-version: 22}
      - uses: actions/cache@v4
        with:
          path: .wasm-build/cache
          key: orz-decoder-sources-${{ runner.os }}-${{ runner.arch }}-${{ hashFiles('script/fetch-decoder-sources.sh') }}
      - name: Verify tag and manifest version
        run: node script/check-release-readiness.mjs "${GITHUB_REF_NAME#v}"
      - run: ./script/fetch-decoder-sources.sh
      - run: ./script/build-native-libs.sh --strict
      - run: SOURCE_DATE_EPOCH="$(git log -1 --format=%ct)" ./script/package-sdk.sh "${{ matrix.preset }}" "$RUNNER_TEMP/release"
      - run: ./script/verify-elf-exports.sh ".cmake-build/${{ matrix.preset }}/libOrzAudioCore.so"
      - uses: actions/upload-artifact@v4
        with:
          name: server-${{ matrix.arch }}
          path: |
            ${{ runner.temp }}/release/*.tar.gz
            ${{ runner.temp }}/release/*.sha256

  web:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: {node-version: 22, registry-url: "https://registry.npmjs.org"}
      - run: node script/check-release-readiness.mjs "${GITHUB_REF_NAME#v}"
      - uses: mymindstorm/setup-emsdk@v14
        with: {version: "4.0.10"}
      - run: ./script/build-wasm-lite.sh
      - working-directory: SDK/Web
        run: npm install && npm run build && npm pack
      - uses: actions/upload-artifact@v4
        with:
          name: web
          path: SDK/Web/orzmusic-audio-core-*.tgz

  apple:
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: {node-version: 22}
      - run: node script/check-release-readiness.mjs "${GITHUB_REF_NAME#v}"
      - run: ./script/build-xcframework.sh "$RUNNER_TEMP/apple"
      - run: ditto -c -k --sequesterRsrc --keepParent "$RUNNER_TEMP/apple/OrzAudioCore.xcframework" "$RUNNER_TEMP/OrzAudioCore.xcframework.zip"
      - uses: actions/upload-artifact@v4
        with:
          name: apple
          path: ${{ runner.temp }}/OrzAudioCore.xcframework.zip

  publish:
    needs: [native, server, web, apple]
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/download-artifact@v4
        with: {path: release, merge-multiple: true}
      - name: Publish release candidate
        if: contains(github.ref_name, '-')
        run: gh release create "$GITHUB_REF_NAME" release/* --repo "$GITHUB_REPOSITORY" --prerelease --generate-notes --verify-tag
        env: {GH_TOKEN: "${{ github.token }}"}
      - name: Publish stable release
        if: ${{ !contains(github.ref_name, '-') }}
        run: gh release create "$GITHUB_REF_NAME" release/* --repo "$GITHUB_REPOSITORY" --generate-notes --verify-tag --latest
        env: {GH_TOKEN: "${{ github.token }}"}
